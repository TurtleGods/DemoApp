on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: Demo-app
  NODE_VERSION: "20.x"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Angular SSR app
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p release
          cp -R dist release/dist
          cp package.json package-lock.json release/
          cd release
          npm ci --omit=dev

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: release
          
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0FA9C8F4BDA54865BDE868A46FF748AE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BA00EA5FDE6F4C2980BD5668DB5F54E6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E920928744F24115B188D25872EFB395 }}

      - name: Deploy to Azure WebApp
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release
          startup-command: npm run start:prod
